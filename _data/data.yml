career-profile:
    title: Career Profile
    summary: |
      Post-Doctoral Associate at Global Monitoring Division (NOAA)
      and CIRES (Colorado University)/ .
      During the past 19 years, I have studied air pollution.
      I have been studying and estimating "a priori" emissions
      modeling air quality and now I'm focused on 
      the "posteriori" emissions. Also,
      I have developed software in R and Fortran.
education:
    title: Education
    info:
      - degree: Doctorate in Meteorology - <a href="https://ibarraespinosa.github.io/">PDF</a>
        university: Universidade de Sao Paulo, Sao Paulo, Brazil
        time: 2013 - 2017
        details: |
          I researched on vehicular emissions and developed an R package named 
          Vehicular Emissions INVentories (VEIN) available to the public 
          In my thesis I estimated vehicular emissions using acvitity from
          GPS, traffic counts and travel demand model outputs.
          Al estimation we balanced by fuel consumption.
          Then, I model air quality using WRF-Chem.
            - Bullet point
      - degree: Master in Environmental Management and Planning - <a href="https://ibarraespinosa.github.io/">PDF</a>
        university: University of Chile, Santiago, Chile
        time: 2010 - 2011
        details: |
          The research during this master was focused in 
          the calculation of vehicular emissions using the 
          models COPERT and HBEFA in Santiago, Chile.
      - degree: Engineering in Risk Prevention and Environment - <a href="https://ibarraespinosa.github.io/">PDF</a>
        university: Universidad Tecnologica Metropolitana (UTEM), Santiago, Chile
        time: 2003 - 2007
        details: |
          I graduated with the final work entitled “Effects of air pollution 
          on Acute Respiratory Infections of the Emergency Care Service 
          (SAPU) Pudahuel La Estrella". 
          I applied time seires and compared negative binomial
          and poisson distribution. 
          I obtained also two diplomas.
            - 2005-2006 Communication and Leadership
            - 2005-2006 English for Professional Purposes
experiences:
    title: Experiences
    info:
      - role: <b>Postdoc NOAA</b> - <a href="https://ibarraespinosa.github.io/">PDF</a>
        time: 2022 - Present
        company: National Oceanographic and Atmospheric Administration <a href="https://gml.noaa.gov/about/stafflist_group.html">NOAA</a> and <a href="https://cires.colorado.edu/directory/sergio-ibarra-espinosa">CIRES</a> (Colorado University)
        details: |
          This works consists in Quantifying the Impacts of COVID-19 
          on CH4 Emissions in North America. Footprints are generated
          using <a href="https://www.ready.noaa.gov/HYSPLIT.php">hysplit</a>
          for <a href="https://gml.noaa.gov/ccgg/obspack/data.php">NOAA CH4 Obspack GLOBALVIEW</a>.
          Then, it is used an inverse model based on <a href="https://gml.noaa.gov/ccgg/carbontracker-lagrange/doc/index.html">carbon-tracker lagranger</a>.
          I developed an R package named <a href="https://github.com/ibarraespinosa/robspackfilter">robspackfilter<a/>. 
      - role: <b>Visiting Researcher NCAR</b> - <a href="https://ibarraespinosa.github.io/">PDF</a>
        time: 2021 - Present
        company: National Center for Atmospheric Research (NCAR), Boulder, Colorado, USA
        details: |
          This work consists in model air quality in south america
          using the model Multi-Scale Infrastructure for Chemistry Modeling 
          <a href="https://www2.acom.ucar.edu/sections/multi-scale-infrastructure-chemistry-modeling-musica">MUSICA</a>.
          Currently I'm running global MUSICA with a zoom
          over South America. 
      - role: <b>Postdoc IPEN</b> - <a href="https://ibarraespinosa.github.io/">PDF</a>
        time: 2021 - 2021
        company: Institute of Nuclear and Energetic Research (IPEN)
        details: |
          This work consisted in participating in the <a href="http://www.metroclima.iag.usp.br/">METROCLIMA</a>
          estimating CO2 emissions and the performing inverse modeling.
      - role: <b>Postdoc CAS</b> - <a href="https://ibarraespinosa.github.io/">PDF</a>
        time: 2019
        company: Chinese Academy of Sciences, Changchun, Jilin, China
        details: |
          Here it was implemented the <a href="https://gmd.copernicus.org/articles/11/2209/2018/">VEIN </a>. model
          in North East China. The resulting manuscript
          was published in <a href="https://www.sciencedirect.com/science/article/abs/pii/S1352231020306865">Atmospheric Environment</a>
          Results. The inventory covered 133 pollutatns with monthly resolution.
      - role: <b>Postdoc USP</b> - <a href="https://ibarraespinosa.github.io/">PDF</a>
        time: 2017 - 2021
        company: Universidade de Sao Paulo, Sao Paulo, Brazil
        details: |
          This projected consisted in implemented different
          policy directions in the model VEIN, and calcualte the 
          impact on air quality using the models
          eixport and WRF-Chem. 
